name: Update Dissent Bar Calendar

on:
  schedule:
    # Runs automatically every night at 14:00 UTC (12:00 AM Canberra Time)
    - cron: '0 14 * * *'
  workflow_dispatch: # Allows you to manually trigger the script from GitHub anytime

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Check out the repository code
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Set up Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Cache dependencies to speed up future runs
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 icalendar pytz

    # 4. Execute the web scraper
    - name: Run Scraper Script
      run: python dissent_scraper.py

    # 5. Commit and push the generated .ics file back to GitHub
    - name: Commit and Push Changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add dissent_bar_canberra.ics
        # Only commit if the file actually changed to avoid empty commit errors
        git diff-index --quiet HEAD || git commit -m "Automated update of Dissent Bar calendar feed"
        git push
